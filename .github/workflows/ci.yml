name: XPS Intelligence CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'auto-builder/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Reject known unsafe fallbacks
        run: |
          ! grep -R "xps-dev-secret-change-in-prod" -n app lib || (echo "Unsafe JWT fallback found" && exit 1)
          ! grep -R "return \[33.4484, -112.0740\]" -n lib || (echo "Silent Phoenix coordinate fallback found" && exit 1)
      - name: Type check
        run: npm run typecheck
      - name: Production build
        env:
          JWT_SECRET: ci-only-secret-ci-only-secret-1234567890
        run: npm run build
